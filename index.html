<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Encontro Elas Com Ele</title>
<link rel="icon" href="assets/encontrodelascomele.jpg" type="image/png">
<!-- Ícones -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #fff5f8;
}

/* HEADER */
header {
    background: #ffc1d6;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    animation: aparecer 0.6s ease;
}

header h1 {
    margin: 0;
    color: #d63384;
    transition: 0.3s;
}

header h1:hover {
    transform: scale(1.05);
}

/* NAV */
nav {
    display: flex;
    gap: 15px;
}

/* BOTÕES */
button {
    background-color: white;
    color: #d63384;
    border: none;
    padding: 10px 18px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;

    transition: all 0.3s ease;
}

/* Hover bonito */
button:hover {
    background-color: #ffe4ec;
    transform: translateY(-3px);
    box-shadow: 0 5px 12px rgba(0,0,0,0.15);
}

/* Clique */
button:active {
    transform: scale(0.95);
}

/* ANIMAÇÃO DE ENTRADA */
@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* FOOTER */
footer {
    background-color: #ffc1d6;
    color: #d63384;
    text-align: center;
    padding: 15px;
    position: fixed;
    bottom: 0;
    width: 100%;
}
/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    
    background-color: rgba(0,0,0,0.4);
    
    justify-content: center;
    align-items: center;
}

.modal-content {
    background-color: #fff;
    padding: 25px;
    border-radius: 20px;
    width: 300px;
    text-align: center;

    animation: aparecerModal 0.3s ease;
}

.fechar {
    float: right;
    font-size: 22px;
    cursor: pointer;
}

.fechar:hover {
    color: #ff1493;
}

/* animação */
@keyframes aparecerModal {
    from {
        opacity: 0;
        transform: scale(0.8);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}
</style>
</head>

<body>

<header>
    <h1>Encontro Elas Com Ele</h1>

    <nav>
        <button onclick="irLogin()">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>

        <button onclick="irCadastro()">
            <i class="fas fa-user-plus"></i> Cadastro
        </button>

        <button onclick="verMesas()">
            <i class="fas fa-calendar-heart"></i> Mesas
        </button>
    </nav>
</header>


<div id="modalMesas" class="modal">
    <div class="modal-content">
        <span class="fechar" onclick="fecharModal()">&times;</span>
        <h2>Próximas Mesas 💖</h2>
        <p>• Mesa 1 - 10/04 às 19h</p>
        <p>• Mesa 2 - 17/04 às 19h</p>
        <p>• Mesa 3 - 24/04 às 19h</p>
    </div>
</div>
<footer>
    Fernanda Leone || 1198419-6905 <br>
    Tatiane Cezaretto || 93468-2728
</footer>
<script>
function irLogin() {
    window.location.href = "login.html";
}

function irCadastro() {
    window.location.href = "cadastro.html";
}

function verMesas() {
    document.getElementById("modalMesas").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modalMesas").style.display = "none";
}

/* fechar clicando fora */
window.onclick = function(event) {
    const modal = document.getElementById("modalMesas");
    if (event.target === modal) {
        modal.style.display = "none";
    }
}
</script>
</body>
</html>
